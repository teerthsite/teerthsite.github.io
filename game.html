<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Echo Shift Prototype</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0d0d16;
        font-family: Arial, sans-serif;
        color: white;
    }

    #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    .room {
        position: absolute;
        width: 100%;
        height: 100%;
        transition: background 0.5s;
    }

    .past {
        background: linear-gradient(#6a4cff, #2b1b55);
    }

    .present {
        background: linear-gradient(#202040, #101020);
    }

    .future {
        background: linear-gradient(#00d4ff, #003344);
    }

    .player {
        position: absolute;
        width: 50px;
        height: 50px;
        background: white;
        border-radius: 10px;
        left: 100px;
        top: 100px;
        transition: 0.05s;
    }

    .object {
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 12px;
    }

    .past-object {
        background: #ffcc00;
    }

    .present-object {
        background: #00ff88;
    }

    .future-object {
        background: #ff0066;
    }

    #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
    }

    button {
        padding: 10px 20px;
        margin-right: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    #message {
        margin-top: 10px;
        font-size: 18px;
    }
</style>
</head>

<body>

<div id="game">
    <div id="room" class="room present"></div>

    <div id="player" class="player"></div>

    <div id="timelineObject" class="object present-object"
         style="left:500px; top:250px;"></div>

    <div id="ui">
        <button onclick="shiftTimeline('past')">Past</button>
        <button onclick="shiftTimeline('present')">Present</button>
        <button onclick="shiftTimeline('future')">Future</button>

        <div id="message">
            Timeline: Present
        </div>
    </div>
</div>

<script>
    const room = document.getElementById("room");
    const object = document.getElementById("timelineObject");
    const message = document.getElementById("message");
    const player = document.getElementById("player");

    let timeline = "present";

    // PLAYER MOVEMENT
    let x = 100;
    let y = 100;
    const speed = 8;

    const keys = {};

    document.addEventListener("keydown", (e) => {
        keys[e.key] = true;

        // Interaction
        if (e.key === "e") {
            interact();
        }
    });

    document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
    });

    function gameLoop() {

        if (keys["w"] || keys["ArrowUp"]) y -= speed;
        if (keys["s"] || keys["ArrowDown"]) y += speed;
        if (keys["a"] || keys["ArrowLeft"]) x -= speed;
        if (keys["d"] || keys["ArrowRight"]) x += speed;

        player.style.left = x + "px";
        player.style.top = y + "px";

        requestAnimationFrame(gameLoop);
    }

    gameLoop();

    // TIMELINE SWITCHING
    function shiftTimeline(newTimeline) {
        timeline = newTimeline;

        room.className = "room " + timeline;

        object.className = "object";

        if (timeline === "past") {
            object.classList.add("past-object");
            object.style.left = "300px";
            object.style.top = "200px";
        }

        if (timeline === "present") {
            object.classList.add("present-object");
            object.style.left = "500px";
            object.style.top = "250px";
        }

        if (timeline === "future") {
            object.classList.add("future-object");
            object.style.left = "700px";
            object.style.top = "150px";
        }

        message.innerHTML =
            "Timeline: " +
            timeline.charAt(0).toUpperCase() +
            timeline.slice(1);
    }

    // INTERACTION SYSTEM
    function interact() {

        const playerRect = player.getBoundingClientRect();
        const objectRect = object.getBoundingClientRect();

        const distance = Math.hypot(
            playerRect.x - objectRect.x,
            playerRect.y - objectRect.y
        );

        if (distance < 120) {

            if (timeline === "past") {
                message.innerHTML =
                    "You found an OLD CLUE from the past.";
            }

            if (timeline === "present") {
                message.innerHTML =
                    "The clue is partially destroyed.";
            }

            if (timeline === "future") {
                message.innerHTML =
                    "The clue evolved into encrypted data.";
            }

        } else {
            message.innerHTML = "Nothing nearby.";
        }
    }
</script>

</body>
</html>
