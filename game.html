<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Echo Shift GTA Prototype</title>

<style>
body{
    margin:0;
    overflow:hidden;
}
canvas{
    display:block;
}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// =====================
// SCENE SETUP
// =====================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202030);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// LIGHT
// =====================

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// =====================
// GROUND
// =====================

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshStandardMaterial({color:0x333333})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

// =====================
// PLAYER
// =====================

const player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.y = 1;
scene.add(player);

// =====================
// CAR
// =====================

const car = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshStandardMaterial({color:0xff0000})
);

car.position.set(5,0.5,0);
scene.add(car);

// =====================
// INPUT
// =====================

const keys = {};

document.addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()] = false;
});

// =====================
// GAME VARIABLES
// =====================

let inCar = false;
let eLast = false;

let clock = new THREE.Clock();

let carSpeed = 0;

let cam = new THREE.Vector3();

// =====================
// GAME LOOP
// =====================

function animate(){

    requestAnimationFrame(animate);

    let dt = Math.min(clock.getDelta(),0.033);

    // =====================
    // WALK MODE
    // =====================

    if(!inCar){

        let speed = 5 * dt;

        if(keys["w"]) player.position.z -= speed;
        if(keys["s"]) player.position.z += speed;
        if(keys["a"]) player.position.x -= speed;
        if(keys["d"]) player.position.x += speed;
    }

    // =====================
    // CAR MODE
    // =====================

    if(inCar){

        let accel = 10 * dt;
        let turn = 2.5 * dt;

        if(keys["w"]) carSpeed += accel;
        if(keys["s"]) carSpeed -= accel;

        // friction
        if(!keys["w"] && !keys["s"]){
            carSpeed *= Math.pow(0.92,dt*60);
        }

        // clamp
        carSpeed = Math.max(-6,Math.min(12,carSpeed));

        let steerFactor = Math.min(1,Math.abs(carSpeed)/5);

        if(keys["a"]) car.rotation.y += turn * steerFactor;
        if(keys["d"]) car.rotation.y -= turn * steerFactor;

        let forward = new THREE.Vector3(
            Math.sin(car.rotation.y),
            0,
            Math.cos(car.rotation.y)
        );

        car.position.add(
            forward.multiplyScalar(carSpeed * dt)
        );

        // player follows seat
        player.position.lerp(
            car.position.clone().setY(1),
            0.2
        );
    }

    // =====================
    // ENTER / EXIT
    // =====================

    if(keys["e"] && !eLast){

        if(!inCar){

            if(player.position.distanceTo(car.position) < 3){
                inCar = true;
            }

        }else{

            inCar = false;

            player.position.x += 2;
        }
    }

    eLast = keys["e"];

    // =====================
    // CAMERA
    // =====================

    let target = inCar ? car.position : player.position;

    let offset = new THREE.Vector3(
        target.x,
        6,
        target.z + 8
    );

    cam.lerp(offset,0.08);

    camera.position.copy(cam);

    camera.lookAt(target);

    renderer.render(scene,camera);
}

animate();

// =====================
// RESIZE
// =====================

window.addEventListener("resize",()=>{

    camera.aspect = window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
