<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini GTA Finished Build</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:2;
}
#map {
    position:absolute;
    bottom:10px;
    right:10px;
    background:black;
    z-index:2;
}
#menu {
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:3;
}
button { padding:10px 20px; font-size:18px; }
</style>
</head>
<body>

<div id="menu">
    <h1>Mini GTA</h1>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="ui"></div>
<canvas id="map" width="150" height="150"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =======================
// BASIC SETUP
// =======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404040));
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

// =======================
// GAME STATE
// =======================
let gameStarted = false;
let paused = false;
let alive = true;

let money = 0;
let health = 100;
let wanted = 0;

let bullets = [];
let enemies = [];
let policeUnits = [];
let vehicles = [];
let currentCar = null;

// =======================
// MENU
// =======================
function startGame(){
    document.getElementById("menu").style.display = "none";
    gameStarted = true;
}

// =======================
// INPUT
// =======================
let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.addEventListener("keydown", e=>{
    if(e.key==="Escape") paused=!paused;
    if(e.key==="r") location.reload();
});

// =======================
// PLAYER
// =======================
const player = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.5,1,4,8),
    new THREE.MeshStandardMaterial({color:0x00ffff})
);
player.position.y = 1;
scene.add(player);

// =======================
// VEHICLE
// =======================
function spawnVehicle(x,z){
    const car = new THREE.Mesh(
        new THREE.BoxGeometry(2,1,4),
        new THREE.MeshStandardMaterial({color:0xff0000})
    );
    car.position.set(x,0.5,z);
    car.speed=0;
    car.dir=0;
    scene.add(car);
    vehicles.push(car);
}

spawnVehicle(10,10);

document.addEventListener("keydown", e=>{
    if(e.key==="f"){
        if(currentCar){ currentCar=null; return; }

        for(let v of vehicles){
            if(player.position.distanceTo(v.position)<3){
                currentCar=v;
            }
        }
    }
});

function updateVehicle(){
    if(!currentCar) return;

    if(keys["w"]) currentCar.speed+=0.02;
    if(keys["s"]) currentCar.speed-=0.02;
    if(keys["a"]) currentCar.dir+=0.03;
    if(keys["d"]) currentCar.dir-=0.03;

    currentCar.position.x += Math.sin(currentCar.dir)*currentCar.speed;
    currentCar.position.z += Math.cos(currentCar.dir)*currentCar.speed;

    currentCar.speed*=0.98;
    player.position.copy(currentCar.position);
}

// =======================
// SHOOTING
// =======================
document.addEventListener("click", shoot);

function shoot(){
    let dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    bullets.push({
        x:player.position.x,
        z:player.position.z,
        dx:dir.x,
        dz:dir.z,
        life:50
    });

    wanted=Math.min(5,wanted+0.2);
}

function updateBullets(){

    for(let b of bullets){
        b.x+=b.dx*2;
        b.z+=b.dz*2;
        b.life--;

        for(let e of enemies){
            let dx=b.x-e.position.x;
            let dz=b.z-e.position.z;

            if(Math.sqrt(dx*dx+dz*dz)<1){
                scene.remove(e);
                enemies.splice(enemies.indexOf(e),1);
                money+=10;
                b.life=0;
                break;
            }
        }
    }

    bullets=bullets.filter(b=>b.life>0);
}

// =======================
// ENEMIES
// =======================
function spawnEnemy(x,z){
    const e=new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({color:0xff0000})
    );
    e.position.set(x,1,z);
    scene.add(e);
    enemies.push(e);
}

for(let i=0;i<10;i++){
    spawnEnemy(Math.random()*80-40,Math.random()*80-40);
}

function updateEnemies(){
    for(let e of enemies){
        let dx=player.position.x-e.position.x;
        let dz=player.position.z-e.position.z;
        let dist=Math.sqrt(dx*dx+dz*dz);

        if(dist<20){
            e.position.x+=dx/dist*0.02;
            e.position.z+=dz/dist*0.02;
        }

        if(dist<2){
            health-=0.3;
        }
    }
}

// =======================
// POLICE
// =======================
function spawnPolice(){
    const cop=new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({color:0x0000ff})
    );
    cop.position.set(player.position.x+10,1,player.position.z+10);
    scene.add(cop);
    policeUnits.push(cop);
}

function updatePolice(){
    if(Math.random()<wanted*0.01 && policeUnits.length<wanted*2){
        spawnPolice();
    }

    for(let p of policeUnits){
        let dx=player.position.x-p.position.x;
        let dz=player.position.z-p.position.z;
        let dist=Math.sqrt(dx*dx+dz*dz);

        if(dist>1){
            p.position.x+=dx/dist*0.03;
            p.position.z+=dz/dist*0.03;
        }
    }
}

// =======================
// STORY
// =======================
const Story={
    step:0,
    missions:[
        {name:"Go to point",x:20,z:20},
        {name:"Kill enemies",type:"kill",required:5,progress:0}
    ]
};

const marker=new THREE.Mesh(
    new THREE.SphereGeometry(1),
    new THREE.MeshBasicMaterial({color:0xffff00})
);
scene.add(marker);

function updateStory(){

    let m=Story.missions[Story.step];
    if(!m) return;

    if(m.x){
        marker.position.set(m.x,1,m.z);

        if(player.position.distanceTo(marker.position)<3){
            Story.step++;
        }
    }

    if(m.type==="kill"){
        if(m.progress>=m.required){
            Story.step++;
        }
    }
}

// =======================
// CAMERA
// =======================
function updateCamera(){
    camera.position.x += (player.position.x-camera.position.x)*0.08;
    camera.position.y=10;
    camera.position.z += (player.position.z+10-camera.position.z)*0.08;
    camera.lookAt(player.position);
}

// =======================
// MINIMAP
// =======================
function drawMap(){
    const c=document.getElementById("map");
    const ctx=c.getContext("2d");

    ctx.fillStyle="black";
    ctx.fillRect(0,0,150,150);

    ctx.fillStyle="cyan";
    ctx.fillRect(75,75,4,4);
}

// =======================
// UI
// =======================
function drawUI(){

    if(!alive){
        document.getElementById("ui").innerHTML="💀 WASTED";
        return;
    }

    document.getElementById("ui").innerHTML=
    `❤️ ${Math.floor(health)}<br>
    💰 ${money}<br>
    ⭐ ${Math.floor(wanted)}<br>
    Mission: ${Story.missions[Story.step]?.name||"Done"}`;
}

// =======================
// LOOP
// =======================
function animate(){

    requestAnimationFrame(animate);

    if(!gameStarted || paused) return;

    if(health<=0) alive=false;

    updateVehicle();
    updateEnemies();
    updatePolice();
    updateBullets();
    updateStory();
    updateCamera();
    drawMap();
    drawUI();

    renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
