<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GTA Style Prototype</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; background:#000; }
</style>
</head>
<body>

<canvas id="c" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let keys = {};

// ===================== INPUT =====================
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ===================== WORLD =====================
let walls = [
    {x:200,y:100,w:200,h:20},
    {x:-200,y:-100,w:20,h:200}
];

// ===================== PLAYER =====================
let player = {
    x:0,y:0,size:20
};

// ===================== CAMERA =====================
let camera = {x:0,y:0};

// ===================== STUN =====================
let stunned = false;
let stunTime = 0;

// ===================== CAR =====================
let car = {
    x:100,y:100,
    angle:0,
    vx:0,vy:0,
    grip:0.92
};

let inCar = true;

// ===================== BIKE =====================
let bike = {
    x:-150,y:0,
    angle:0,
    speed:0,
    balance:0
};

let usingBike = false;

// ===================== POLICE =====================
let police = {
    x:300,y:300,
    speed:1.5
};

let wanted = 0;

// ===================== SHAKE =====================
let shake = 0;

// ===================== UPDATE =====================
function update(){

// ===================== STUN =====================
if(stunned){
    stunTime--;
    if(stunTime <= 0) stunned = false;
    return;
}

// ===================== SWITCH VEHICLE =====================
if(keys["1"]) { inCar = true; usingBike = false; }
if(keys["2"]) { inCar = false; usingBike = true; }

// ===================== CAR DRIFT =====================
if(inCar){

    if(keys["w"]){
        car.vx += Math.cos(car.angle)*0.2;
        car.vy += Math.sin(car.angle)*0.2;
    }

    if(keys["a"]) car.angle -= 3;
    if(keys["d"]) car.angle += 3;

    let fX = Math.cos(car.angle);
    let fY = Math.sin(car.angle);

    let dot = car.vx*fX + car.vy*fY;

    car.vx = car.vx*car.grip + fX*dot*(1-car.grip);
    car.vy = car.vy*car.grip + fY*dot*(1-car.grip);

    car.x += car.vx;
    car.y += car.vy;

    player.x = car.x;
    player.y = car.y;

    if(Math.hypot(car.vx,car.vy) > 6 && Math.random()<0.01){
        stun(80);
    }
}

// ===================== BIKE =====================
if(usingBike){

    if(keys["w"]) bike.speed += 0.2;
    if(keys["s"]) bike.speed *= 0.95;

    if(keys["a"]) bike.angle -= 3;
    if(keys["d"]) bike.angle += 3;

    bike.x += Math.cos(bike.angle)*bike.speed;
    bike.y += Math.sin(bike.angle)*bike.speed;

    bike.balance += (Math.random()-0.5)*0.1;
    bike.balance *= 0.9;

    if(Math.abs(bike.balance) > 1.5){
        stun(120);
    }

    player.x = bike.x;
    player.y = bike.y;
}

// ===================== POLICE CHASE =====================
if(wanted > 0){

    let dx = player.x - police.x;
    let dy = player.y - police.y;
    let d = Math.hypot(dx,dy);

    police.x += dx/d * police.speed;
    police.y += dy/d * police.speed;

    if(d < 20){
        stun(100);
    }
}

// ===================== CAMERA =====================
camera.x += (player.x - camera.x) * 0.08;
camera.y += (player.y - camera.y) * 0.08;

// shake
if(shake > 0){
    camera.x += (Math.random()-0.5)*shake;
    camera.y += (Math.random()-0.5)*shake;
    shake *= 0.9;
}

// ===================== WANTED =====================
if(keys[" "]) wanted = Math.min(5, wanted+1);

}

// ===================== STUN FUNCTION =====================
function stun(t){
    stunned = true;
    stunTime = t;
    shake = 10;
}

// ===================== DRAW =====================
function draw(){
ctx.clearRect(0,0,800,400);

// camera transform
ctx.save();
ctx.translate(400 - camera.x, 200 - camera.y);

// ===================== WALLS =====================
ctx.fillStyle="gray";
for(let w of walls){
    ctx.fillRect(w.x,w.y,w.w,w.h);
}

// ===================== CAR =====================
ctx.fillStyle="cyan";
ctx.save();
ctx.translate(car.x,car.y);
ctx.rotate(car.angle);
ctx.fillRect(-10,-10,20,20);
ctx.restore();

// ===================== BIKE =====================
ctx.fillStyle="orange";
ctx.save();
ctx.translate(bike.x,bike.y);
ctx.rotate(bike.angle + bike.balance*0.3);
ctx.fillRect(-8,-8,16,16);
ctx.restore();

// ===================== PLAYER =====================
ctx.fillStyle="white";
ctx.fillRect(player.x-5,player.y-5,10,10);

// ===================== POLICE =====================
ctx.fillStyle="red";
ctx.fillRect(police.x-10,police.y-10,20,20);

// ===================== HUD =====================
ctx.fillStyle="yellow";
for(let i=0;i<wanted;i++){
    ctx.fillText("⭐",10+i*15,20);
}

ctx.restore();
}

// ===================== LOOP =====================
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
