<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GTA Style Sandbox Demo</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    font-size:14px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🌍 WORLD
let world = { shake:0 };

// 🎮 INPUT
let keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// 🧍 PLAYER
let player = { x:0, y:0, vx:0, vy:0 };

// 🚗 CAR
let car = { x:120, y:0, vx:0, vy:0, angle:0, inCar:false };

// 👮 POLICE
let police = { x:400, y:400 };

// ⭐ WANTED
let wanted = 0;

// 🎯 MISSION
let mission = { x:300, y:300, active:true };

// 🧍 PLAYER MOVEMENT
function updatePlayer(){
    if(car.inCar) return;

    let a = 0.08;

    if(keys["w"]) player.y -= a * 10;
    if(keys["s"]) player.y += a * 10;
    if(keys["a"]) player.x -= a * 10;
    if(keys["d"]) player.x += a * 10;

    player.vx *= 0.85;
    player.vy *= 0.85;

    player.x += player.vx;
    player.y += player.vy;
}

// 🚗 CAR PHYSICS (GTA FEEL)
function updateCar(){

    if(!car.inCar) return;

    let fx = Math.cos(car.angle);
    let fy = Math.sin(car.angle);

    if(keys["w"]){
        car.vx += fx * 0.12;
        car.vy += fy * 0.12;
    }

    let speed = Math.hypot(car.vx,car.vy);
    let turn = 0.02 + speed * 0.002;

    if(keys["a"]) car.angle -= turn;
    if(keys["d"]) car.angle += turn;

    let grip = keys["shift"] ? 0.98 : 0.92;

    car.vx *= grip;
    car.vy *= grip;

    car.x += car.vx;
    car.y += car.vy;

    if(speed > 5){
        world.shake = speed * 0.4;
    }

    player.x = car.x;
    player.y = car.y;
}

// 👮 POLICE AI
function updatePolice(){

    let target = car.inCar ? car : player;

    let dx = target.x - police.x;
    let dy = target.y - police.y;

    let dist = Math.hypot(dx,dy);

    police.x += dx/dist * 0.05 * Math.max(1,wanted);
    police.y += dy/dist * 0.05 * Math.max(1,wanted);

    if(dist < 30){
        world.shake = 8;
    }
}

// ⭐ WANTED SYSTEM
function updateWanted(){

    if(keys[" "]) wanted = Math.min(5, wanted + 0.05);

    if(wanted > 0){
        wanted *= 0.999;
    }
}

// 🎯 MISSION
function updateMission(){

    let dx = player.x - mission.x;
    let dy = player.y - mission.y;

    let dist = Math.hypot(dx,dy);

    if(dist < 20 && mission.active){
        mission.active = false;
        wanted = 0;
    }
}

// 🎮 DRAW WORLD
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let shakeX = (Math.random()-0.5)*world.shake;
    let shakeY = (Math.random()-0.5)*world.shake;

    world.shake *= 0.9;

    ctx.save();
    ctx.translate(canvas.width/2 - player.x + shakeX,
                  canvas.height/2 - player.y + shakeY);

    // 🌍 ground
    ctx.fillStyle = "#2d8f2d";
    ctx.fillRect(-2000,-2000,4000,4000);

    // 🧍 player
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x-10,player.y-10,20,20);

    // 🚗 car
    ctx.fillStyle = "blue";
    ctx.save();
    ctx.translate(car.x,car.y);
    ctx.rotate(car.angle);
    ctx.fillRect(-15,-10,30,20);
    ctx.restore();

    // 👮 police
    ctx.fillStyle = "red";
    ctx.fillRect(police.x-10,police.y-10,20,20);

    // 🎯 mission
    if(mission.active){
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(mission.x,mission.y,10,0,Math.PI*2);
        ctx.fill();
    }

    ctx.restore();

    drawMinimap();
    drawUI();
}

// 🗺️ MINIMAP
function drawMinimap(){

    let size = 140;

    ctx.fillStyle = "black";
    ctx.fillRect(10,10,size,size);

    ctx.fillStyle = "white";
    ctx.fillRect(10+size/2,10+size/2,4,4);

    ctx.fillStyle = "red";
    ctx.fillRect(10+police.x*0.05,10+police.y*0.05,4,4);

    if(mission.active){
        ctx.fillStyle = "yellow";
        ctx.fillRect(10+mission.x*0.05,10+mission.y*0.05,4,4);
    }
}

// 🎮 UI
function drawUI(){
    document.getElementById("ui").innerHTML =
        "Wanted: " + Math.floor(wanted) + " ⭐<br>" +
        "E = Enter/Exit Car | SHIFT = Drift | SPACE = Increase Wanted";
}

// 🚗 ENTER / EXIT CAR
document.addEventListener("keydown",e=>{
    if(e.key==="e"){
        car.inCar = !car.inCar;
        player.x = car.x;
        player.y = car.y;
    }
});

// 🔁 LOOP
function loop(){
    updatePlayer();
    updateCar();
    updatePolice();
    updateWanted();
    updateMission();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
